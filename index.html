<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>内部报价工具</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', Roboto, sans-serif; background: #eef2f5; margin: 0; padding: 24px; }
        .container { max-width: 1400px; margin: 0 auto; background: white; border-radius: 28px; box-shadow: 0 8px 20px rgba(0,0,0,0.08); overflow-x: auto; }
        .header { background: #1e3a3b; color: white; padding: 16px 28px; display: flex; align-items: center; gap: 20px; flex-wrap: wrap; }
        .logo-img { height: 48px; width: auto; max-width: 160px; object-fit: contain; background: white; border-radius: 8px; padding: 4px 12px; }
        .title { font-size: 20px; font-weight: 500; letter-spacing: 0.5px; }
        .content { padding: 28px 32px; }
        .filter-bar { background: #f8fafc; border-radius: 24px; padding: 20px 24px; margin-bottom: 32px; display: flex; flex-wrap: wrap; gap: 16px; align-items: flex-end; border: 1px solid #e2edf2; }
        .field { display: flex; flex-direction: column; gap: 6px; min-width: 140px; }
        .field label { font-size: 12px; font-weight: 700; color: #1e4a4b; letter-spacing: 0.3px; }
        .field input, .field select { padding: 8px 12px; border: 1px solid #cbd5e1; border-radius: 14px; font-size: 14px; background: white; }
        button { background: #1e5a5b; color: white; border: none; padding: 8px 28px; border-radius: 40px; font-weight: 600; cursor: pointer; transition: 0.2s; margin-top: 8px; font-size: 14px; }
        button:hover { background: #0f3b3c; }
        .quote-table { width: 100%; border-collapse: collapse; font-size: 13px; }
        .quote-table th { background: #eef2f5; padding: 12px 10px; text-align: left; font-weight: 600; border-bottom: 2px solid #dce5ec; }
        .quote-table td { padding: 12px 10px; border-bottom: 1px solid #e9edf2; }
        .total-cost { font-weight: 800; color: #1e5a5b; }
        .note { margin-top: 24px; font-size: 12px; color: #4b6b6c; background: #f0f6f7; padding: 12px 20px; border-radius: 20px; }
        .status { color: #b45309; font-size: 13px; margin-top: 16px; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <img src="ask_logo.jpg" alt="Logo" class="logo-img" onerror="this.style.display='none'">
        <div class="title">📄 内部报价单</div>
    </div>
    <div class="content">
        <div class="filter-bar">
            <div class="field"><label>📌 FAK/NAC/NOR</label><select id="rateType"><option>FAK</option><option>NAC</option><option>NOR</option></select></div>
            <div class="field"><label>🚢 CARRIER</label><input id="carrier" value="COSCO"></div>
            <div class="field"><label>📍 POL</label><select id="pol">
                <option value="Shanghai">Shanghai</option>
                <option value="Ningbo">Ningbo</option>
                <option value="Yantian">Yantian</option>
                <option value="Shekou">Shekou</option>
                <option value="Hong Kong">Hong Kong</option>
                <option value="Qingdao">Qingdao</option>
                <option value="Xiamen">Xiamen</option>
                <option value="Xingang">Xingang</option>
                <option value="Dalian">Dalian</option>
                <option value="Nansha">Nansha</option>
                <option value="Fuzhou">Fuzhou</option>
                <option value="Mawei">Mawei</option>
                <option value="Lianyungang">Lianyungang</option>
            </select></div>
            <div class="field"><label>📍 POD</label><select id="pod">
                <option value="Auckland">Auckland</option>
                <option value="Lyttelton">Lyttelton</option>
                <option value="Napier">Napier</option>
                <option value="Tauranga">Tauranga</option>
                <option value="Wellington">Wellington</option>
            </select></div>
            <div class="field"><label>⏱️ T/T (天)</label><input id="tt" value="22"></div>
            <div class="field"><label>📦 CONTAINER TYPE</label><select id="ctnType"><option>20GP</option><option>40GP</option><option>40HQ</option></select></div>
            <div><button id="quoteBtn">💰 生成报价</button></div>
        </div>
        <div id="resultArea"></div>
        <div id="statusMsg" class="status"></div>
        <div class="note">
            ✅ <strong>计费逻辑</strong><br/>
            • <strong>NAC</strong> = 海运费 + BAU (BUC值 × 柜型倍数) ，FAF = 0<br/>
            • <strong>FAK / NOR</strong> = 海运费 + FAF (FAF值 × 柜型倍数) ，BAU = 0<br/>
            • 柜型倍数：20尺 (×1)，40尺 (×2)<br/>
            • TOTAL = OCEAN FREIGHT + BAU (仅NAC) + FAF (仅FAK/NOR)
        </div>
    </div>
</div>

<script>
    // ======================= 运价数据 =======================
    const fakData = {
        "Auckland": { "Shanghai": [800,1600,1600], "Ningbo": [800,1600,1600], "Shekou": [800,1600,1600], "Yantian": [800,1600,1600], "Hong Kong": [800,1600,1600], "Dalian": [800,1600,1600], "Xingang": [800,1600,1600], "Qingdao": [800,1600,1600], "Xiamen": [800,1600,1600], "Nansha":[800,1600,1600], "Fuzhou":[850,1700,1700], "Mawei":[900,1800,1800], "Lianyungang":[850,1700,1700] },
        "Lyttelton": { "Shanghai": [800,1600,1600], "Yantian": [800,1600,1600], "Shekou": [800,1600,1600] },
        "Napier":    { "Shanghai": [800,1600,1600], "Yantian": [800,1600,1600] },
        "Tauranga":  { "Shanghai": [800,1600,1600], "Yantian": [800,1600,1600] },
        "Wellington":{ "Shanghai": [800,1600,1600], "Yantian": [1000,1800,1800] }
    };
    const norData = {
        "Auckland": { "Shanghai": [525,1050,1050], "Yantian": [525,1050,1050], "Xingang": [575,1150,1150], "Qingdao": [575,1150,1150], "Ningbo": [525,1050,1050] },
        "Lyttelton":{ "Shanghai": [525,1050,1050], "Yantian": [525,1050,1050] }
    };
    const nacData = {
        "Yantian":  { "20GP":262, "40GP":524, "40HQ":524 },
        "Xingang":  { "20GP":312, "40GP":624, "40HQ":624 },
        "Shekou":   { "20GP":262, "40GP":524, "40HQ":524 },
        "Shanghai": { "20GP":262, "40GP":524, "40HQ":524 },
        "Qingdao":  { "20GP":312, "40GP":624, "40HQ":624 },
        "Ningbo":   { "20GP":262, "40GP":524, "40HQ":524 },
        "Nansha":   { "20GP":412, "40GP":824, "40HQ":824 }
    };
    
    // ======================= BUC & FAF 数据 =======================
    const bucFafSource = {
        months: ["Dec","Jan","Feb","Mar","Apr","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"],
        rows: [
            { tariff: "503/507", type: "BUC", values: [438,417,393,393,438,800,655,0,0,0,0,0,0,0] },
            { tariff: "503/507", type: "FAF", values: [122,101,77,101,146,507,414,0,0,0,0,0,0,0] }
        ]
    };
    
    function getCurrentMonth() {
        const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
        return months[new Date().getMonth()];
    }
    
    function getValueByType(type, is40ft) {
        const targetRow = bucFafSource.rows.find(r => r.tariff === "503/507" && r.type === type);
        if (!targetRow) return 0;
        const currentMonth = getCurrentMonth();
        const colIndex = bucFafSource.months.findIndex(m => m === currentMonth);
        if (colIndex === -1) return 0;
        let value = targetRow.values[colIndex] || 0;
        if (is40ft) value = value * 2;
        return value;
    }
    
    function getOceanFreight(rateType, pol, pod, ctnType) {
        const ctnIdx = ctnType === "20GP" ? 0 : (ctnType === "40GP" ? 1 : 2);
        if (rateType === "FAK") {
            const val = fakData[pod]?.[pol]?.[ctnIdx];
            return val !== undefined ? val : null;
        } else if (rateType === "NOR") {
            const val = norData[pod]?.[pol]?.[ctnIdx];
            return val !== undefined ? val : null;
        } else if (rateType === "NAC") {
            const val = nacData[pol]?.[ctnType];
            return val !== undefined ? val : null;
        }
        return null;
    }
    
    const localFees = { doc: 90, dthc: 571, aklLevy: 140 };
    
    function generateQuote() {
        const rateType = document.getElementById('rateType').value;
        const carrier = document.getElementById('carrier').value.trim() || "COSCO";
        const pol = document.getElementById('pol').value;
        const pod = document.getElementById('pod').value;
        const tt = document.getElementById('tt').value || "22";
        const ctnType = document.getElementById('ctnType').value;
        const is40ft = ctnType.includes("40");
        
        let ocean = getOceanFreight(rateType, pol, pod, ctnType);
        
        let bau = 0;
        let faf = 0;
        let validity = "";
        
        if (rateType === "NAC") {
            bau = getValueByType("BUC", is40ft);
            faf = 0;
            validity = `NAC 合约价 + BAU (${is40ft ? '40尺x2' : '20尺'})`;
        } else if (rateType === "FAK") {
            bau = 0;
            faf = getValueByType("FAF", is40ft);
            validity = `FAK + FAF (${is40ft ? '40尺x2' : '20尺'})`;
        } else if (rateType === "NOR") {
            bau = 0;
            faf = getValueByType("FAF", is40ft);
            validity = `NOR 运价 + FAF (${is40ft ? '40尺x2' : '20尺'})`;
        }
        
        if (ocean === null || ocean === undefined) {
            document.getElementById('resultArea').innerHTML = `<div style="background:#fee;padding:16px;border-radius:16px;color:#b91c1c;">⚠️ 未找到匹配运价，请检查 POL/POD 组合。</div>`;
            return;
        }
        
        const totalUSD = ocean + bau + faf;
        
        const html = `
            <table class="quote-table">
                <thead>
                    <tr><th>FAK/NAC</th><th>CARRIER</th><th>POL</th><th>POD</th><th>T/T</th><th>CONTAINER TYPE</th><th>Currency</th><th>OCEAN FREIGHT</th>
                    <th>FAF</th><th>BAU</th><th>Emergency</th><th>Security</th><th>TOTAL USD</th>
                    <th>DOC</th><th>DTHC</th><th>AKL LEVY</th><th>VALIDITY</th>
                </tr>
                </thead>
                <tbody>
                <tr>
                    <td>${rateType}${carrier}${pol}${pod}${tt}${ctnType}
                    <td>USD</td><td>${ocean.toFixed(2)}</td>
                    <td>${faf.toFixed(2)}</td><td>${bau.toFixed(2)}</td><td>0.00</td><td>0.00</td>
                    <td class="total-cost"><strong>${totalUSD.toFixed(2)}</strong></td>
                    <td>${localFees.doc}</td><td>${localFees.dthc}</td><td>${localFees.aklLevy}</td>
                    <td>${validity}</td>
                </tr>
                </tbody>
            </table>
        `;
        
        document.getElementById('resultArea').innerHTML = html;
        document.getElementById('statusMsg').innerHTML = `✅ 报价生成: ${new Date().toLocaleString()} | BAU: ${bau} | FAF: ${faf}`;
    }
    
    document.getElementById('quoteBtn').addEventListener('click', generateQuote);
    window.addEventListener('load', generateQuote);
</script>
</body>
</html>
